<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora IRRF 2025</title>

    <link rel="stylesheet" href="./css/style.css">

    <!-- Chart.js primeiro -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Seu script DEPOIS -->
    <script src="js/script.js"></script>
</head>

<body>

    <header>
        <h1>Calculadora de IRRF 2025</h1>
    </header>

    <main>

        <form onsubmit="calcular(event)">

            <div>
                <label for="salario">Salário Bruto (R$)</label>
                <input type="number" id="salario" step="0.01" required>
            </div>

            <div>
                <label for="dependentes">Número de Dependentes</label>
                <input type="number" id="dependentes">
            </div>

            <div>
                <label for="descontos">Outras Deduções (R$)</label>
                <input type="number" id="descontos" step="0.01">
            </div>

            <div>
                <label>Tipo de Tributação:</label><br>

                <input type="radio" name="tipoDesconto" value="auto" checked>
                <label>Automático (melhor opção)</label><br>

                <input type="radio" name="tipoDesconto" value="simplificado">
                <label>Simplificado (R$ 607,20)</label><br>

                <input type="radio" name="tipoDesconto" value="completo">
                <label>Completo (Dependentes + Deduções)</label>
            </div>

            <button type="submit">Calcular Imposto</button>

        </form>

        <div id="resultado"></div>

        <table id="tabela" style="display:none;">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody id="dadosTabela"></tbody>
        </table>

        <!-- TAMANHO DEFINIDO -->
        <canvas id="grafico" width="400" height="400"></canvas>

    </main>

</body>

</html>
